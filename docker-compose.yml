version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: splitbro_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - splitbro_mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: splitbro_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://root:rootpassword@mongodb:27017/splitbro?authSource=admin
      - JWT_SECRET=supersecretjwtkey_for_development
      - NODE_ENV=development
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: splitbro_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - NODE_ENV=development
    depends_on:
      - backend

volumes:
  splitbro_mongo_data:
